<!doctype html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>【豪禮抽獎】Lv.1 回饋抽</title>
  <style>
    /* 
      ====================================
      SWAG Design Tokens Integration
      ====================================
    */
    :root {
      /* Typography */
      --font-family: "PingFang TC", "Noto Sans TC", sans-serif;
      
      /* Surface & Background */
      --surface: #191919;           /* Dark/Surface */
      --surface-container: #232323; /* Dark/Surface Container */
      --surface-variant: #474747;   /* Dark/Surface Container Variant (40% op) */
      
      /* Brand Colors */
      --primary: #00D2BE;           /* Aquamarine 300 */
      --primary-hover: rgba(0, 210, 190, 0.8);
      --pink: #F6418D;              /* Loverse Theme */
      --yellow: #FFD100;            /* Creator Theme */
      --purple: #8238BA;            /* Asset Theme */
      --blue: #60C4E8;              /* Info */
      
      /* Text & UI Stack */
      --text-main: #FFFFFF;         /* On Primary Variant */
      --text-sec: #C8C8C8;          /* Secondary */
      --text-muted: #9B9B9B;        /* Tertiary Inverse */
      --success: #15EA48;           /* Green */
      --error: #CF0404;             /* Red */
      --outline: #474747;           /* Outline */
      
      /* Shape & Spacing (Mode 1) */
      --radius-xs: 4px;
      --radius-s: 8px;
      --radius-m: 12px;
      --radius-l: 16px;
      --radius-full: 999px;
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      min-height: 100vh;
      font-family: var(--font-family);
      color: var(--text-main);
      background: var(--surface);
      display: grid;
      place-items: center;
      padding: 16px;
    }

    .container {
      width: 100%;
      max-width: 960px; /* Desktop Token standard */
      background: var(--surface-container);
      border: 1px solid var(--outline);
      border-radius: var(--radius-l);
      padding: 24px;
      box-shadow: 0 16px 32px rgba(0,0,0,0.4);
    }

    .header-area {
      text-align: center;
      margin-bottom: 24px;
    }

    h1 {
      margin: 0;
      font-size: 28px; /* Headline Small */
      color: var(--yellow);
      font-weight: 600;
    }

    .sub {
      margin: 8px 0 0;
      color: var(--text-sec);
      font-size: 14px; /* Body Medium */
    }

    /* Tabs */
    .tabs {
      display: flex;
      gap: 12px;
      margin-bottom: 24px;
      justify-content: center;
      flex-wrap: wrap;
    }

    .tab-btn {
      border: 1px solid var(--outline);
      background: var(--surface);
      color: var(--text-sec);
      border-radius: var(--radius-full);
      padding: 10px 24px;
      font-size: 16px; /* Body Large */
      font-weight: 600;
      cursor: pointer;
      transition: all 0.2s;
    }

    .tab-btn.active {
      border-color: var(--primary);
      color: var(--primary);
      background: rgba(0, 210, 190, 0.1);
    }

    /* Panels */
    .panel {
      display: none;
      background: var(--surface);
      border-radius: var(--radius-m);
      border: 1px solid var(--surface-variant);
      padding: 24px;
      text-align: center;
    }

    .panel.active { display: block; }

    /* --- Slot Style --- */
    .reels {
      display: flex;
      justify-content: center;
      gap: 16px;
      margin: 24px 0;
    }

    .reel {
      width: 120px;
      height: 120px;
      border-radius: var(--radius-m);
      border: 2px solid var(--surface-variant);
      background: var(--surface-container);
      display: grid;
      place-items: center;
      font-weight: 600;
      font-size: 20px;
      color: var(--primary);
      text-align: center;
      padding: 8px;
    }
    .reel.spin { animation: slotPulse 0.2s infinite alternate; color: var(--text-sec); }

    /* --- Wheel Style --- */
    .wheel-wrap {
      display: grid;
      place-items: center;
      padding: 16px 0;
      position: relative;
    }
    .wheel-pointer {
      width: 0; height: 0;
      border-left: 16px solid transparent;
      border-right: 16px solid transparent;
      border-top: 24px solid var(--yellow);
      margin-bottom: -10px;
      z-index: 2;
    }
    .wheel {
      width: min(340px, 80vw);
      aspect-ratio: 1;
      border-radius: 50%;
      border: 6px solid var(--surface-variant);
      transition: transform 4s cubic-bezier(.15,.8,.18,1);
      /* Token Colors matched to slices */
      background: conic-gradient(
        var(--pink) 0deg 36deg,
        var(--surface-container) 36deg 72deg,
        var(--yellow) 72deg 108deg,
        var(--surface-container) 108deg 144deg,
        var(--primary) 144deg 180deg,
        var(--surface-container) 180deg 216deg,
        var(--purple) 216deg 252deg,
        var(--surface-container) 252deg 288deg,
        var(--blue) 288deg 324deg,
        var(--surface-container) 324deg 360deg
      );
      position: relative;
      overflow: hidden;
    }
    .wheel-labels { position: absolute; inset: 0; pointer-events: none; }
    
    /* 更新後的轉盤文字樣式：放射狀、朝外、向中間置中 */
    .wheel-label {
      position: absolute;
      top: 0;
      left: 50%;
      width: 50%; /* 寬度為圓半徑 */
      height: 100%; /* 高度與輪盤同高，方便以 0 50% 圓心為軸旋轉 */
      transform-origin: 0 50%; /* 錨點設為圓心 */
      transform: rotate(calc(var(--angle) - 90deg));
      display: flex;
      align-items: center;
      justify-content: center; /* 讓文字在扇形半徑上置中 */
      padding-left: 20px; /* 避開中央的 GO 按鈕 */
      font-size: 14px;
      font-weight: 600;
      color: var(--text-main);
      text-shadow: 0 1px 4px #000; /* 加重陰影避免被背景色吃掉 */
      white-space: nowrap; /* 不斷行 */
    }

    .wheel-center {
      position: absolute;
      inset: 38%;
      border-radius: 50%;
      background: var(--surface);
      border: 4px solid var(--primary);
      display: grid;
      place-items: center;
      font-size: 18px;
      font-weight: 600;
      color: var(--primary);
      cursor: pointer;
      z-index: 3;
    }

    /* Actions & Draw Button */
    .draw-btn {
      border: none;
      border-radius: var(--radius-full);
      background: var(--primary);
      color: #000;
      font-weight: 600;
      padding: 12px 32px;
      font-size: 16px;
      cursor: pointer;
      transition: background 0.2s;
    }
    .draw-btn:hover:not(:disabled) { background: var(--primary-hover); }
    .draw-btn:disabled { opacity: 0.3; cursor: not-allowed; }

    /* Status & Dashboard */
    .dashboard {
      margin-top: 24px;
      display: grid;
      grid-template-columns: 1fr;
      gap: 16px;
    }
    @media (min-width: 768px) {
      .dashboard { grid-template-columns: 1fr 1fr; }
    }

    .card {
      background: var(--surface);
      border: 1px solid var(--surface-variant);
      border-radius: var(--radius-m);
      padding: 16px;
    }
    .card-title {
      font-size: 16px;
      font-weight: 600;
      color: var(--text-sec);
      margin: 0 0 12px;
      padding-bottom: 8px;
      border-bottom: 1px solid var(--surface-variant);
    }

    .result-text { font-size: 18px; line-height: 1.5; }
    .win { color: var(--success); font-weight: 600; }
    .lose { color: var(--text-muted); font-weight: 600; }
    
    .history-list {
      margin: 0; padding-left: 20px;
      color: var(--text-muted);
      font-size: 14px;
      line-height: 1.8;
    }

    /* Prize Remaining Grid */
    .prize-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(130px, 1fr));
      gap: 8px;
    }
    .prize-item {
      background: var(--surface-container);
      border: 1px solid var(--surface-variant);
      border-radius: var(--radius-s);
      padding: 8px;
      text-align: center;
      display: flex;
      flex-direction: column;
      gap: 4px;
    }
    .prize-tier { font-size: 12px; color: var(--yellow); }
    .prize-name { font-size: 14px; font-weight: 600; color: var(--text-main); }
    .prize-stock { font-size: 12px; color: var(--text-sec); }
    .prize-item.empty { opacity: 0.4; }
    .prize-item.empty .prize-stock { color: var(--error); }

    /* Animations */
    @keyframes slotPulse {
      from { border-color: var(--surface-variant); }
      to { border-color: var(--primary); }
    }
  </style>
</head>
<body>
  <main class="container">
    <div class="header-area">
      <h1>🎁 【豪禮抽獎】Lv.1 回饋抽</h1>
      <p class="sub">16 週檔期．總計 368,000 抽．保底抽出 100 鑽</p>
    </div>

    <!-- 遊戲分頁 (取消扭蛋) -->
    <div class="tabs" id="tabs">
      <button class="tab-btn active" data-tab="slot">🎰 經典拉霸</button>
      <button class="tab-btn" data-tab="wheel">🎡 幸運轉盤</button>
    </div>

    <!-- 頁籤內容: 拉霸 -->
    <section class="panel active" id="panel-slot">
      <div class="reels">
        <div class="reel" id="reel-1">-</div>
        <div class="reel" id="reel-2">-</div>
        <div class="reel" id="reel-3">-</div>
      </div>
      <button class="draw-btn" id="slotDrawBtn">消耗 1 次免費抽獎</button>
    </section>

    <!-- 頁籤內容: 轉盤 -->
    <section class="panel" id="panel-wheel">
      <div class="wheel-wrap">
        <div class="wheel-pointer"></div>
        <div class="wheel" id="wheel">
          <div class="wheel-labels" id="wheelLabels"></div>
          <button class="wheel-center" id="wheelGo">GO</button>
        </div>
      </div>
    </section>

    <!-- 資訊儀表板 -->
    <div class="dashboard">
      <!-- 開獎結果與歷史 -->
      <div class="card">
        <div class="card-title" id="drawCount">目前總抽數：0 抽</div>
        <div class="result-text" id="resultBox">
          <span class="text-sec">請選擇上方遊戲並點擊抽獎...</span>
        </div>
        <hr style="border:0; border-top:1px solid var(--surface-variant); margin: 16px 0;">
        <div style="font-size: 14px; color: var(--text-sec); margin-bottom: 8px;">最近抽獎紀錄：</div>
        <ul class="history-list" id="historyList">
          <li>尚無紀錄</li>
        </ul>
      </div>

      <!-- 獎池剩餘數量 -->
      <div class="card">
        <div class="card-title">💎 獎池剩餘數量 (16週配置)</div>
        <div class="prize-grid" id="prizeGrid">
          <!-- JS 動態生成 -->
        </div>
      </div>
    </div>
  </main>

  <script>
    // 總抽數 368,000
    const TOTAL_DRAWS = 368000;
    
    // 基礎獎池設定
    const prizePool =[
      { tier: 'SSS', label: 'iPhone 16', stock: 1, initProb: 1 / TOTAL_DRAWS, win: true },
      { tier: 'SS', label: 'PS5', stock: 1, initProb: 1 / TOTAL_DRAWS, win: true },
      { tier: 'S', label: 'Switch 2', stock: 1, initProb: 1 / TOTAL_DRAWS, win: true },
      { tier: '稀有度 1', label: '看到爽 15min', stock: 368, initProb: 368 / TOTAL_DRAWS, win: true },
      { tier: '稀有度 2', label: '看到爽 10min', stock: 736, initProb: 736 / TOTAL_DRAWS, win: true },
      { tier: '稀有度 3', label: '1,000 鑽', stock: 1104, initProb: 1104 / TOTAL_DRAWS, win: true },
      { tier: '稀有度 4', label: '看到爽 5min', stock: 1472, initProb: 1472 / TOTAL_DRAWS, win: true },
      { tier: '稀有度 5', label: '500 鑽', stock: 1840, initProb: 1840 / TOTAL_DRAWS, win: true },
      { tier: '稀有度 6', label: '100 鑽', stock: 49680, initProb: 49680 / TOTAL_DRAWS, win: true }
    ];

    // 計算總中獎機率，並加入未中獎補齊 100%
    const totalWinProb = prizePool.reduce((acc, p) => acc + p.initProb, 0);
    prizePool.push({ tier: '-', label: '銘謝惠顧', stock: '∞', initProb: 1 - totalWinProb, win: false });

    // 建立可動態扣減庫存的 Map
    const currentStock = new Map(prizePool.map(p =>[p.label, p.stock]));

    // DOM 元素
    const tabBtns = document.querySelectorAll('.tab-btn');
    const panels = {
      slot: document.getElementById('panel-slot'),
      wheel: document.getElementById('panel-wheel')
    };
    const reels =[document.getElementById('reel-1'), document.getElementById('reel-2'), document.getElementById('reel-3')];
    const wheel = document.getElementById('wheel');
    const wheelGo = document.getElementById('wheelGo');
    const wheelLabels = document.getElementById('wheelLabels');
    const slotDrawBtn = document.getElementById('slotDrawBtn');
    
    const drawCountEl = document.getElementById('drawCount');
    const resultBox = document.getElementById('resultBox');
    const historyList = document.getElementById('historyList');
    const prizeGrid = document.getElementById('prizeGrid');

    let activeTab = 'slot';
    let drawCount = 0;
    let spinning = false;
    let wheelRotate = 0;
    const historyLog = [];
    const slotSymbols =['💎', '🎁', '📱', '🎮', '🌟', '❌'];

    // 依權重隨機抽選
    function randomDraw(pool) {
      const rand = Math.random();
      let cumulative = 0;
      for (const item of pool) {
        cumulative += item.probability;
        if (rand <= cumulative) return item;
      }
      return pool[pool.length - 1]; // Fallback
    }

    // 動態獲取當前獎池機率 (無庫存的機率轉移)
    function getDynamicPool() {
      let shiftedLoseProb = 0;
      const dynamicPool = prizePool.map(item => {
        if (!item.win) return { ...item, probability: item.initProb };
        
        const remain = currentStock.get(item.label);
        if (remain > 0) {
          return { ...item, probability: item.initProb };
        } else {
          shiftedLoseProb += item.initProb; 
          return null;
        }
      }).filter(Boolean);

      const loseItem = dynamicPool.find(i => !i.win);
      if (loseItem) loseItem.probability += shiftedLoseProb;
      
      return dynamicPool;
    }

    // 渲染轉盤文字 (採用放射狀排版)
    function renderWheel() {
      const slice = 360 / prizePool.length;
      wheelLabels.innerHTML = prizePool.map((item, index) => {
        // 設定各自扇形的中心點角度
        const angle = index * slice + slice / 2;
        // 原本截斷文字，現在將全名直接顯示，靠外層 CSS `white-space: nowrap` + `align-items` 控制
        return `<span class="wheel-label" style="--angle:${angle}deg">${item.label}</span>`;
      }).join('');
    }

    // 渲染獎池剩餘數量 Dashboard
    function renderPrizeGrid() {
      prizeGrid.innerHTML = prizePool.filter(p => p.win).map(item => {
        const remain = currentStock.get(item.label);
        const isEmpty = remain === 0;
        return `
          <div class="prize-item ${isEmpty ? 'empty' : ''}">
            <div class="prize-tier">${item.tier}</div>
            <div class="prize-name">${item.label}</div>
            <div class="prize-stock">${isEmpty ? '已發完' : `剩餘: ${remain}`}</div>
          </div>
        `;
      }).join('');
    }

    // 更新紀錄與結果
    function handleResult(prize) {
      if (prize.win && currentStock.get(prize.label) > 0) {
        currentStock.set(prize.label, currentStock.get(prize.label) - 1);
      }
      
      renderPrizeGrid();
      
      resultBox.innerHTML = `
        <span class="${prize.win ? 'win' : 'lose'}">${prize.win ? '🎉 恭喜中獎！' : '🥺 銘謝惠顧'}</span>
        <br>
        <span style="font-size:14px; color:var(--text-main);">獲得：${prize.label}</span>
      `;

      historyLog.unshift(`[${activeTab === 'slot' ? '拉霸' : '轉盤'}] ${prize.win ? '🟢' : '🔴'} ${prize.label}`);
      if (historyLog.length > 5) historyLog.pop();
      historyList.innerHTML = historyLog.map(log => `<li>${log}</li>`).join('');
    }

    // 切換分頁
    function switchTab(tabName) {
      if (spinning) return;
      activeTab = tabName;
      tabBtns.forEach(btn => btn.classList.toggle('active', btn.dataset.tab === tabName));
      Object.entries(panels).forEach(([name, panel]) => panel.classList.toggle('active', name === tabName));
    }

    // 動畫 - 拉霸
    function animSlot(prize) {
      reels.forEach(r => r.classList.add('spin'));
      const intervals = reels.map((r, i) => setInterval(() => {
        r.textContent = slotSymbols[Math.floor(Math.random() * slotSymbols.length)];
      }, 100));

      reels.forEach((r, i) => {
        setTimeout(() => {
          clearInterval(intervals[i]);
          r.classList.remove('spin');
          r.textContent = prize.win ? (i === 2 ? '🎉' : '🎁') : '❌';
          if(i===2) r.textContent = prize.label.substring(0,4);
        }, 800 + i * 400);
      });
      return 1800;
    }

    // 動畫 - 轉盤
    function animWheel(prize) {
      const idx = prizePool.findIndex(p => p.label === prize.label);
      const slice = 360 / prizePool.length;
      const targetDeg = 360 - (idx * slice + slice / 2);
      wheelRotate += (360 * 6) + targetDeg; 
      wheel.style.transform = `rotate(${wheelRotate}deg)`;
      return 4000;
    }

    // 執行抽獎
    function triggerDraw() {
      if (spinning) return;
      spinning = true;
      slotDrawBtn.disabled = wheelGo.disabled = true;
      
      const dynamicPool = getDynamicPool();
      const prize = randomDraw(dynamicPool);
      
      let delay = 0;
      if (activeTab === 'slot') delay = animSlot(prize);
      else if (activeTab === 'wheel') delay = animWheel(prize);

      setTimeout(() => {
        drawCount++;
        drawCountEl.textContent = `目前總抽數：${drawCount} 抽`;
        handleResult(prize);
        
        slotDrawBtn.disabled = wheelGo.disabled = false;
        spinning = false;
      }, delay);
    }

    // 綁定事件
    tabBtns.forEach(btn => btn.addEventListener('click', () => switchTab(btn.dataset.tab)));
    slotDrawBtn.addEventListener('click', triggerDraw);
    wheelGo.addEventListener('click', triggerDraw);

    // 初始化
    renderWheel();
    renderPrizeGrid();
  </script>
</body>
</html>
